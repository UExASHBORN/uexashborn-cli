<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UExASHBORN</title>
</head>

<body>

<div id="app" class="terminal">

  <div id="intro-svg"></div>

  <div id="mode-toggle" class="mode-toggle">Switch to GUI</div>

  <div id="skip-intro" class="skip-intro">Skip Intro</div>

  <div id="cli-output" class="terminal-output"></div>

  <div class="terminal-input-row">
    <span class="prompt"></span>
    <div class="input-wrapper">
      <input id="cli-input" class="terminal-input" autocomplete="off"/>
      <span id="fake-cursor" class="fake-cursor">█</span>
    </div>
  </div>

</div>
<div id="gui-popup" class="gui-popup hidden">
  <div class="gui-popup-content">

    <div class="gui-popup-header">
      <span>GUI</span>
      <button id="gui-popup-close">✕</button>
    </div>

    <div class="gui-popup-body">
      <p>GUI?</p>
      <p>No.</p>
      <p>This system runs on command line only.</p>
      <p>Nice try though :)</p>
    </div>

  </div>
</div>

<script type="module" src="/src/main.js"></script>

</body>
</html>
